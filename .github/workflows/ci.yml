name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_USER: test-user
      DB_PASSWORD: test-password
      DB_NAME: test-db
      DB_PORT: 3306
      JWT_SECRET: test-jwt-secret
      DATA_ENCRYPTION_KEY: test-data-encryption-key
      HASH_PEPPER: test-hash-pepper
      PRIVATE_KEY_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint backend
        run: npm run lint --prefix backend

      - name: Test backend
        run: npm run test:ci --prefix backend

      - name: Lint frontend
        run: npm run lint --prefix frontend

      - name: Test frontend
        run: npm run test:ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
