name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_USER: test-user
      DB_PASSWORD: test-password
      DB_NAME: test-db
      DB_PORT: 3306
      JWT_SECRET: test-jwt-secret
      DATA_ENCRYPTION_KEY: test-data-encryption-key
      HASH_PEPPER: test-hash-pepper
      PRIVATE_KEY_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Lint backend
        run: npm run lint --prefix backend

      - name: Test backend
        run: npm run test:ci --prefix backend

  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm run lint --prefix frontend

      - name: Test frontend
        run: npm run test:ci --prefix frontend

      - name: Build frontend
        run: npm run build:ci --prefix frontend

  security-audit:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Capture backend audit
        run: node scripts/security/capture-npm-audit.cjs --prefix backend --out backend-audit-current.json

      - name: Validate backend enforce policy
        run: node scripts/security/validate-audit-policy.cjs --audit backend-audit-current.json --policy docs/security/ci-policy.md --scope backend --mode enforce

      - name: Capture frontend audit
        run: node scripts/security/capture-npm-audit.cjs --prefix frontend --out frontend-audit-current.json

      - name: Validate frontend enforce policy
        run: node scripts/security/validate-audit-policy.cjs --audit frontend-audit-current.json --policy docs/security/ci-policy.md --scope frontend --mode enforce
