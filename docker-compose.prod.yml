services:
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - hospital-network

  backend:
    build:
      context: ./backend
      target: prod
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST:?DB_HOST is required}
      - DB_USER=${DB_USER:?DB_USER is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:?DB_NAME is required}
      - DB_PORT=${DB_PORT:-3306}
      - PORT=${PORT:-4000}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}
      - HASH_PEPPER=${HASH_PEPPER:?HASH_PEPPER is required}
      - PRIVATE_KEY_ENCRYPTION_KEY=${PRIVATE_KEY_ENCRYPTION_KEY:?PRIVATE_KEY_ENCRYPTION_KEY is required}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SOCKET_SLOW_THRESHOLD_MS=${SOCKET_SLOW_THRESHOLD_MS:-300}
      - CHATBOT_API_URL=${CHATBOT_API_URL:?CHATBOT_API_URL is required}
      - CHATBOT_API_KEY=${CHATBOT_API_KEY:?CHATBOT_API_KEY is required}
      - CHATBOT_MODEL=${CHATBOT_MODEL:-gemini-2.5-flash-preview-09-2025}
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.request({host:'127.0.0.1',port:4000,path:'/api/health',method:'GET',timeout:2000},(res)=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.on('timeout',()=>{req.destroy();process.exit(1);});req.end();"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hospital-network

networks:
  hospital-network:
    driver: bridge

volumes:
  mysql-data:
