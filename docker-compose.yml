
services:
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-Hospital5}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - hospital-network

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DB_HOST=${DB_HOST:-mysql}
      - DB_USER=${DB_USER:-hospital_app}
      - DB_PASSWORD=${DB_PASSWORD:-MatKhauBaoMatHon123456}
      - DB_NAME=${DB_NAME:-Hospital5}
      - DB_PORT=${DB_PORT:-3306}
      - DB_TIMEZONE=${DB_TIMEZONE:-+07:00}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - DB_POOL_MIN=${DB_POOL_MIN:-0}
      - DB_POOL_ACQUIRE_MS=${DB_POOL_ACQUIRE_MS:-30000}
      - DB_POOL_IDLE_MS=${DB_POOL_IDLE_MS:-10000}
      - DB_POOL_EVICT_MS=${DB_POOL_EVICT_MS:-1000}
      - DB_RETRY_MAX=${DB_RETRY_MAX:-3}
      - DB_RETRY_BACKOFF_MS=${DB_RETRY_BACKOFF_MS:-100}
      - DB_RETRY_BACKOFF_EXPONENT=${DB_RETRY_BACKOFF_EXPONENT:-1.5}
      - PORT=${PORT:-4000}
      - JWT_SECRET=${JWT_SECRET:-secretkey}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:-DungMotChuoiBiMatVaDaiHon256BitODay_ThieuBaoMat}
      - HASH_PEPPER=${HASH_PEPPER:-ThemMotChuoiPepperBiMatChoHash}
      - PRIVATE_KEY_ENCRYPTION_KEY=${PRIVATE_KEY_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SOCKET_SLOW_THRESHOLD_MS=${SOCKET_SLOW_THRESHOLD_MS:-300}
      - CHATBOT_API_URL=${CHATBOT_API_URL:-https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent}
      - CHATBOT_API_KEY=${CHATBOT_API_KEY:-your_chatbot_api_key}
      - CHATBOT_MODEL=${CHATBOT_MODEL:-gemini-2.5-flash-preview-09-2025}
    command: ["npm", "run", "dev"]
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.request({host:'127.0.0.1',port:4000,path:'/api/health',method:'GET',timeout:2000},(res)=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.on('timeout',()=>{req.destroy();process.exit(1);});req.end();"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hospital-network
  

  
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - hospital-network


networks:
  hospital-network:
    driver: bridge

volumes:
  mysql-data:
